<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vea - Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #c8ff00; /* Warna hijau cerah khas kamu */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 36px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        /* === LOGO BARU KHUSUS === */
        .logo-icon {
            width: 140px;
            height: 140px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-base {
            width: 100%;
            height: 100%;
            background-color: #000000;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-vea {
            width: 55%;
            height: 55%;
            position: relative;
        }

        .logo-vea span {
            position: absolute;
            background-color: #c8ff00;
        }

        /* Huruf V */
        .v-left {
            left: 10%;
            bottom: 0;
            width: 12%;
            height: 70%;
            transform: skewX(20deg);
        }
        .v-right {
            right: 10%;
            bottom: 0;
            width: 12%;
            height: 70%;
            transform: skewX(-20deg);
        }
        .v-middle {
            left: 38%;
            bottom: 0;
            width: 24%;
            height: 12%;
            border-radius: 6px;
        }

        .brand-name {
            font-size: 96px;
            font-weight: 900;
            color: #000000;
            letter-spacing: -1px;
        }

        .coming-soon {
            font-size: 24px;
            color: #556b00;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 500;
        }

        .social-button {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 32px;
            border: 2px solid #556b00;
            border-radius: 50px;
            text-decoration: none;
            color: #000000;
            font-size: 28px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .social-button:hover {
            background-color: rgba(0,0,0,0.05);
        }

        .x-icon {
            width: 32px;
            height: 32px;
        }

        .footer-text {
            position: absolute;
            bottom: 40px;
            font-size: 24px;
            color: #556b00;
            opacity: 0.8;
        }

        /* Responsif HP */
        @media (max-width: 768px) {
            .brand {
                flex-direction: column;
                gap: 16px;
            }
            .brand-name {
                font-size: 72px;
            }
            .logo-icon {
                width: 110px;
                height: 110px;
            }
            .social-button {
                font-size: 22px;
                padding: 12px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">
            <!-- Logo Baru Vea -->
            <div class="logo-icon">
                <div class="logo-base">
                    <div class="logo-vea">
                        <span class="v-left"></span>
                        <span class="v-right"></span>
                        <span class="v-middle"></span>
                    </div>
                </div>
            </div>
            <h1 class="brand-name">Vea</h1>
        </div>

        <p class="coming-soon">COMING SOON</p>

        <a href="#" class="social-button">
            <svg class="x-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
            @vea_xyz
        </a>
    </div>

    <p class="footer-text">vea.xyz</p>
</body>
</html>
